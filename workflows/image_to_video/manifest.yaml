name: image_to_video
display_name: "Image to Video (Wan2.2 LightX2V)"
description: "Convert a static image into an animated video using Wan2.2 I2V with LightX2V 4-step distillation. Perfect for animating tarot cards, character art, or any still image."
category: video
parameters:
  - name: image
    type: string
    required: true
    description: "Input image filename (uploaded to ComfyUI)"
  - name: prompt
    type: string
    required: false
    default: ""
    description: "Text prompt to guide the animation (e.g. 'slow mystical movement, flickering candlelight')"
  - name: negative_prompt
    type: string
    required: false
    default: ""
    description: "What to avoid in the video"
  - name: width
    type: integer
    required: false
    default: 640
    description: "Video width in pixels"
  - name: height
    type: integer
    required: false
    default: 960
    description: "Video height in pixels (default 960 for portrait/tarot)"
  - name: length
    type: integer
    required: false
    default: 81
    description: "Number of frames to generate (81 = ~5 seconds at 16fps)"
  - name: seed
    type: integer
    required: false
    default: -1
    description: "Random seed (-1 for random)"
node_mappings:
  image: ["1.inputs.image"]
  prompt: ["3.inputs.text"]
  negative_prompt: ["4.inputs.text"]
  width: ["6.inputs.width"]
  height: ["6.inputs.height"]
  length: ["6.inputs.length"]
  seed: ["30.inputs.noise_seed", "31.inputs.noise_seed"]
